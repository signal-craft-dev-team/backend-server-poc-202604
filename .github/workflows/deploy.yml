name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BE_VM_HOST }}
          username: ${{ secrets.BE_VM_USER }}
          key: ${{ secrets.BE_VM_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_NAME
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE_NAME":latest
            docker stop signalcraft-backend || true
            docker rm signalcraft-backend || true
            docker run -d \
              --name signalcraft-backend \
              --restart always \
              -p 8000:8000 \
              -v ~/logs:/app/logs \
              -e MQTT_HOST=${{ secrets.MQTT_HOST }} \
              -e MQTT_PORT=1883 \
              -e MQTT_USER=${{ secrets.MQTT_USER }} \
              -e MQTT_PASS=${{ secrets.MQTT_PASS }} \
              "$IMAGE_NAME":latest
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}