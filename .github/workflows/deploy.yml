name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BE_VM_HOST }}
          username: ${{ secrets.BE_VM_USER }}
          key: ${{ secrets.BE_VM_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_NAME
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE_NAME":latest
            docker stop signalcraft-backend || true
            docker rm signalcraft-backend || true
            docker run -d \
              --name signalcraft-backend \
              --restart always \
              -p 8000:8000 \
              -v ~/logs:/app/logs \
              -e MQTT_HOST=${{ secrets.MQTT_HOST }} \
              -e MQTT_PORT=1883 \
              -e MQTT_USER=${{ secrets.MQTT_USER }} \
              -e MQTT_PWD=${{ secrets.MQTT_PWD }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PWD=${{ secrets.DB_PWD }} \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }} \
              -e GCS_SIGNED_URL_EXPIRY_MINUTES=5 \
              -e SQL_INSTANCE_CONNECTION_NAME=${{ secrets.SQL_INSTANCE_CONNECTION_NAME }} \
              -e MONGODB_URI=${{ secrets.MONGODB_URI }} \
              -e MONGODB_DB_NAME=${{ secrets.MONGODB_DB_NAME }} \
              "$IMAGE_NAME":latest
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}